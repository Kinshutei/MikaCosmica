<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MikaCosmica</title>
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- YouTube IFrame Player（画面外） -->
  <div id="ytPlayerWrap">
    <div id="ytPlayer"></div>
  </div>

  <!-- 検索バー -->
  <div id="searchBar">
    <input type="text" id="searchInput" placeholder="Search songs...">
    <button id="updateBtn" title="アプリ更新">↺</button>
    <button id="guideBtn">Guide</button>
  </div>

  <div id="guideOverlay">
    <div id="guideModal">
      <button id="guideClose">✕</button>
      <h2>MikaCosmica 利用ガイド</h2>
      <h3>基本操作</h3>
      <ul>
        <li>トラックをクリックすると再生開始</li>
        <li>▶ / ⏸ で再生・一時停止</li>
        <li>⏮ / ⏭ で前・次のトラックへ</li>
      </ul>
      <h3>音量調整</h3>
      <ul>
        <li>「－」「＋」で音量を5%ずつ調整</li>
        <li>トラックごとに音量を記憶します</li>
      </ul>
      <h3>検索</h3>
      <ul>
        <li>曲名・アーティスト名で絞り込み</li>
      </ul>
      <h3>アプリ更新</h3>
      <ul>
        <li>↺ ボタンでキャッシュをクリアし、最新のアプリとデータを取得します</li>
        <li>更新後は1分間ボタンが無効になります</li>
      </ul>
    </div>
  </div>

  <!-- プレーヤー -->
  <div id="player">
    <div id="thumbnail">
      <img id="thumbImg" src="" alt="">
      <div id="thumbPlaceholder">♪</div>
    </div>
    <div id="trackInfo">
      <div id="trackTitle">MikaCosmica</div>
      <div id="trackFrame">曲を選択してください</div>
      <div id="trackDots"></div>
    </div>
    <div id="seekArea">
      <span id="timeElapsed">0:00</span>
      <div id="seekBar">
        <div id="seekProgress"></div>
        <div id="seekHandle"></div>
      </div>
      <span id="timeTotal">0:00</span>
    </div>
    <div id="controls">
      <button id="randomBtn" class="ctrl-btn" title="ランダム再生"></button>
      <button id="volDownBtn" class="vol-btn" title="音量を下げる">－</button>
      <button id="prevBtn" class="ctrl-btn" title="前の曲">⏮</button>
      <button id="playBtn" class="ctrl-btn play" title="再生/停止">▶</button>
      <button id="nextBtn" class="ctrl-btn" title="次の曲">⏭</button>
      <button id="volUpBtn" class="vol-btn" title="音量を上げる">＋</button>
    </div>
  </div>

  <div id="volumeToast"></div>

  <!-- トラックリスト -->
  <div id="listArea">
    <div id="listLive" class="track-list"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
